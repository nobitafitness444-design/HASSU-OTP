<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HASU OFFICIAL STORE - OTP Experts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass-card { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(90deg, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-img { height: 45px; width: 45px; object-fit: cover; border-radius: 50%; border: 2px solid #a855f7; }
        .search-input { background: rgba(30, 30, 30, 0.6); border: 1px solid rgba(168, 85, 247, 0.4); color: white; }
        .search-input:focus { outline: none; border-color: #a855f7; box-shadow: 0 0 10px rgba(168, 85, 247, 0.3); }
    </style>
</head>
<body class="text-white">

    <nav class="p-4 border-b border-gray-800 flex justify-between items-center bg-black sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <img src="logo.png.jpg" alt="HASU Logo" class="logo-img">
            <h1 class="text-2xl font-bold tracking-tighter uppercase">Hasu <span class="text-purple-500">Official</span></h1>
        </div>
        <a href="https://wa.me/923159160439" class="bg-green-600 px-5 py-2 rounded-full text-sm font-bold hover:bg-green-700 transition">WhatsApp</a>
    </nav>

    <header class="py-12 px-6 text-center">
        <h2 class="text-4xl font-extrabold mb-6 leading-tight">Find Your <span class="gradient-text">Virtual Number</span></h2>
        
        <div class="max-w-md mx-auto relative mb-10">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
            <input type="text" id="countrySearch" onkeyup="searchCountry()" placeholder="Search country name..." 
                   class="search-input w-full pl-12 pr-4 py-3 rounded-2xl text-lg">
        </div>
    </header>

    <section class="max-w-6xl mx-auto px-6 py-4">
        <h3 class="text-xl font-bold mb-6 flex items-center gap-2 text-green-400">
            <i class="fas fa-bolt"></i> CHEAP NUMBERS (Rs. 500)
        </h3>
        <div id="cheapGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </section>

    <section class="max-w-6xl mx-auto px-6 py-12">
        <h3 class="text-xl font-bold mb-6 flex items-center gap-2 text-purple-400">
            <i class="fas fa-crown"></i> PREMIUM NUMBERS
        </h3>
        <div id="premiumGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </section>

    <section class="max-w-4xl mx-auto px-6 py-10">
        <div class="bg-gradient-to-b from-gray-900 to-black border border-gray-800 rounded-3xl p-8">
            <h3 class="text-2xl font-bold mb-8 text-center text-purple-400 uppercase tracking-widest">Payment Methods</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-gray-800/40 p-5 rounded-2xl border border-gray-700 text-center">
                    <p class="text-orange-500 font-bold mb-1">JazzCash</p>
                    <p class="font-mono font-bold">03341557415</p>
                    <p class="text-[10px] text-gray-500">Shahbaz Ali</p>
                </div>
                <div class="bg-gray-800/40 p-5 rounded-2xl border border-gray-700 text-center">
                    <p class="text-blue-400 font-bold mb-1">Zindigi</p>
                    <p class="font-mono font-bold">03341557415</p>
                    <p class="text-[10px] text-gray-500">Sadaqat Ali</p>
                </div>
                <div class="bg-gray-800/40 p-5 rounded-2xl border border-gray-700 text-center">
                    <p class="text-green-500 font-bold mb-1">EasyPaisa</p>
                    <p class="font-mono font-bold">03372800072</p>
                    <p class="text-[10px] text-gray-500">Shahbaz Ali</p>
                </div>
            </div>
        </div>
    </section>

    <script>
        const cheapNumbers = [
            { name: 'Argentina', price: 500, flag: 'ar', code: '+54' },
            { name: 'Armenia', price: 500, flag: 'am', code: '+374' },
            { name: 'Bangladesh', price: 500, flag: 'bd', code: '+880' },
            { name: 'Bermuda', price: 500, flag: 'bm', code: '+1' },
            { name: 'United Arab Emirates', price: 500, flag: 'ae', code: '+971' },
            { name: 'United Kingdom', price: 500, flag: 'gb', code: '+44' },
            { name: 'Canada', price: 500, flag: 'ca', code: '+1' },
            { name: 'Pakistan', price: 500, flag: 'pk', code: '+92' }
        ];

        const premiumNumbers = [
            { name: 'United States', price: 1000, flag: 'us', code: '+1' },
            { name: 'Egypt', price: 600, flag: 'eg', code: '+20' },
            { name: 'France', price: 1500, flag: 'fr', code: '+33' },
            { name: 'Germany', price: 700, flag: 'de', code: '+49' },
            { name: 'Australia', price: 1800, flag: 'au', code: '+61' }
        ];

        function createCard(item) {
            return `
                <div class="country-card glass-card p-5 rounded-3xl border border-gray-800 hover:border-purple-500 transition-all duration-300" data-name="${item.name.toLowerCase()}">
                    <div class="flex justify-between items-center mb-4">
                        <img src="https://flagcdn.com/w80/${item.flag}.png" class="w-12 rounded border border-gray-700 shadow-lg">
                        <span class="text-xs font-bold text-green-500 bg-green-500/10 px-2 py-1 rounded">ACTIVE</span>
                    </div>
                    <h4 class="text-xl font-bold mb-1">${item.name}</h4>
                    <p class="text-gray-400 text-sm mb-4">Price: <span class="text-white font-bold">Rs. ${item.price}</span></p>
                    <a href="https://wa.me/923159160439?text=Hi Hasu, mujhe ${item.name} (${item.code}) ka number chahiye." 
                       class="block text-center bg-purple-600 hover:bg-purple-500 py-3 rounded-xl font-bold text-sm transition-all">
                       Buy Now
                    </a>
                </div>
            `;
        }

        // Load Initial Cards
        document.getElementById('cheapGrid').innerHTML = cheapNumbers.map(createCard).join('');
        document.getElementById('premiumGrid').innerHTML = premiumNumbers.map(createCard).join('');

        // Search Functionality
        function searchCountry() {
            let input = document.getElementById('countrySearch').value.toLowerCase();
            let cards = document.getElementsByClassName('country-card');
            
            for (let card of cards) {
                let countryName = card.getAttribute('data-name');
                if (countryName.includes(input)) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            }
        }
    </script>

    <footer class="text-center py-10 text-gray-600 text-[10px] tracking-widest uppercase">
        &copy; 2026 HASU OFFICIAL STORE. ALL RIGHTS RESERVED.
    </footer>
</body>
</html>
